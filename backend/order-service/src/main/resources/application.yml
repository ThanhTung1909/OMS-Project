server:
  port: 8083
spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mariadb://localhost:3306/db_order
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
eureka:
  client:
      service-url:
        defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
      prefer-ip-address: true