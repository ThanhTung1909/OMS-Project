server:
  port: 8082
spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:mariadb://localhost:3306/db_inventory
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
    listener:
      simple:
        acknowledge-mode: manual
        max-concurrency: 3
        prefetch: 10
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.oms.inventoryservice: INFO
    org.springframework.amqp: INFO