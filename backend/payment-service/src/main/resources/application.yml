server:
  port: 8084
spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mariadb://localhost:3306/db_payment
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

vnpay:
  tmnCode: ${SPRING_VNPAY_TMN_CODE}
  hashSecret: ${SPRING_VNPAY_HASH_SECRET}
  url: ${SPRING_VNPAY_PAY_URL}
  returnUrl: ${SPRING_VNPAY_RETURN_URL} 