server:
  port: 8086

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mariadb://localhost:3306/db_notification
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000ms # Thử lại sau 3 giây
          max-attempts: 3        # Tối đa 3 lần
          multiplier: 2.0        # Tăng dần thời gian chờ
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.oms.notificationservice: INFO
    org.springframework.amqp: INFO