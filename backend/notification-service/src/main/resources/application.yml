server:
  port: 8086

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mariadb://${SPRING_DATASOURCE_HOST:mariadb}:3306/db_notification
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:user}
    password: ${SPRING_RABBITMQ_PASSWORD:password}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 10000ms # Bắt đầu thử lại sau 10 giây
          max-attempts: 5           # Thử lại tối đa 5 lần
          multiplier: 2.0           # Tăng dần thời gian (10s, 20s, 40s, 80s...)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.oms.notificationservice: INFO
    org.springframework.amqp: INFO

app:
  services:
    order-service:
      url: http://order-service:8083
    profile-service:
      url: http://profile-service:8088
    identity-service:
      url: http://identity-service:8080