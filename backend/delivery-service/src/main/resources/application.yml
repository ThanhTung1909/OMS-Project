server:
  port: 8085
spring:
  application:
    name: delivery-service
  datasource:
    url: jdbc:mariadb://localhost:3306/db_delivery
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/